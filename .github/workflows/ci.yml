name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/placement_management
          JWT_SECRET: ci_test_secret_key_please_change
          ACCESS_TOKEN_EXPIRE: 1h
          REFRESH_TOKEN_EXPIRE: 7d
          CORS_ORIGINS: http://localhost:3000
          APP_BASE_URL: http://localhost:3000
          LOG_LEVEL: warn
        run: |
          npm run seed
          nohup npm start > /tmp/backend.log 2>&1 &
          sleep 5

      - name: Run smoke test
        env:
          SMOKE_API_BASE: http://localhost:5000/api
          SMOKE_MONGO_URI: mongodb://localhost:27017/placement_management
        run: npm run smoke

