services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/placement_management
      JWT_SECRET: change_me_in_production
      ACCESS_TOKEN_EXPIRE: 1h
      REFRESH_TOKEN_EXPIRE: 7d
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_BASE_URL: http://localhost:3000
      SKIP_EMAIL_VERIFICATION: "true"
      LOG_LEVEL: info
      REQUEST_TIMEOUT_MS: 30000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
      AUTH_RATE_LIMIT_MAX: 30
      MONGO_MAX_POOL_SIZE: 50
      MONGO_MIN_POOL_SIZE: 5
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mongo-data:

